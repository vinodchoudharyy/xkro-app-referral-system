<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#667eea">
  <title>XKRO - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    html, body { height: 100%; overflow: hidden; }
    body { 
      background: linear-gradient(160deg, #1e1e2f 0%, #2d2d44 50%, #1e1e2f 100%); 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 20px;
    }
    .app-container { 
      width: 100%; 
      max-width: 380px;
      background: #252538;
      border-radius: 28px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      overflow: hidden;
      position: relative;
    }
    .app-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px 30px 30px;
      text-align: center;
      border-radius: 0 0 40px 40px;
      position: relative;
    }
    .app-header::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 40px;
      background: #252538;
      border-radius: 0 0 20px 20px;
    }
    .app-icon {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.2);
      border-radius: 24px;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      backdrop-filter: blur(10px);
    }
    .app-title { color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .app-subtitle { color: rgba(255,255,255,0.7); font-size: 14px; }
    
    .app-body { padding: 30px 25px 40px; }
    .form-group { margin-bottom: 18px; }
    .form-label { color: rgba(255,255,255,0.6); font-size: 12px; font-weight: 500; margin-bottom: 8px; display: block; }
    .form-input { 
      width: 100%; 
      padding: 16px 18px; 
      background: #1e1e2f;
      border: 2px solid #3d3d56;
      border-radius: 14px; 
      font-size: 15px; 
      color: #fff;
      transition: all 0.3s;
    }
    .form-input::placeholder { color: rgba(255,255,255,0.3); }
    .form-input:focus { outline: none; border-color: #667eea; background: #1a1a2e; }
    
    .btn-primary { 
      width: 100%; 
      padding: 18px; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      color: white; 
      border: none; 
      border-radius: 14px; 
      font-size: 15px; 
      font-weight: 600; 
      cursor: pointer; 
      margin-top: 10px;
      transition: all 0.3s;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.6; }
    
    .app-footer { text-align: center; padding-top: 20px; color: rgba(255,255,255,0.5); font-size: 13px; }
    .app-footer a { color: #667eea; text-decoration: none; font-weight: 600; }
    
    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    .divider span { padding: 0 15px; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="app-header">
      <div class="app-icon">🚀</div>
      <h1 class="app-title">XKRO</h1>
      <p class="app-subtitle">Refer & Earn</p>
    </div>
    
    <div class="app-body">
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">EMAIL</label>
          <input type="email" class="form-input" id="email" placeholder="Enter your email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <input type="password" class="form-input" id="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
      </form>
      
      <div class="divider"><span>OR</span></div>
      
      <p class="app-footer">Don't have an account? <a href="/signup">Create Account</a></p>
    </div>
  </div>
  
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        
        if (response.ok) {
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/dashboard';
        } else {
          alert(data.message);
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch (error) {
        alert('Error logging in');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
