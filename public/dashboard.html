<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#667eea">
  <title>XKRO - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    html, body { height: 100%; overflow-x: hidden; }
    body { background: #1e1e2f; min-height: 100vh; }
    
    .app-header {
      background: linear-gradient(160deg, #2d2d44 0%, #1e1e2f 100%);
      padding: 60px 20px 25px;
      border-radius: 0 0 30px 30px;
      position: relative;
    }
    .app-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 180px;
      background: linear-gradient(135deg, rgba(102,126,234,0.3) 0%, rgba(118,75,162,0.3) 100%);
      border-radius: 0 0 50% 50%;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      position: relative;
    }
    .app-logo { display: flex; align-items: center; gap: 10px; }
    .app-logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .app-logo-text { font-size: 22px; font-weight: 700; color: #fff; }
    .logout-btn { background: rgba(255,255,255,0.1); color: #fff; padding: 10px 16px; border-radius: 10px; text-decoration: none; font-size: 13px; font-weight: 500; }
    
    .user-info { position: relative; }
    .user-greeting { color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 4px; }
    .user-name { color: #fff; font-size: 26px; font-weight: 700; }
    
    .container { max-width: 400px; margin: 0 auto; padding: 0 20px 30px; }
    
    .wallet-card {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      border-radius: 20px;
      padding: 25px;
      margin-top: -45px;
      position: relative;
      box-shadow: 0 10px 30px rgba(17,153,142,0.4);
    }
    .wallet-label { color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 500; margin-bottom: 5px; }
    .wallet-amount { color: #fff; font-size: 42px; font-weight: 700; }
    .wallet-sub { color: rgba(255,255,255,0.7); font-size: 13px; margin-top: 5px; }
    
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
    .stat-card { 
      background: #252538; 
      padding: 20px; 
      border-radius: 16px; 
      text-align: center; 
    }
    .stat-value { color: #fff; font-size: 28px; font-weight: 700; }
    .stat-label { color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 4px; }
    
    .section { margin-top: 25px; }
    .section-title { color: rgba(255,255,255,0.6); font-size: 12px; font-weight: 600; margin-bottom: 12px; letter-spacing: 0.5px; }
    
    .referral-card {
      background: #252538;
      border-radius: 18px;
      padding: 20px;
    }
    .referral-link-box {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .referral-input { 
      flex: 1; 
      padding: 14px 16px; 
      background: #1e1e2f;
      border: 2px solid #3d3d56;
      border-radius: 12px; 
      font-size: 13px; 
      color: #fff;
    }
    .btn-copy {
      padding: 14px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
    }
    
    .share-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .share-btn {
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .share-btn.whatsapp { background: #25D366; color: white; }
    .share-btn.share { background: #FF6B6B; color: white; }
    
    .list-card {
      background: #252538;
      border-radius: 18px;
      padding: 20px;
    }
    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .list-item:last-child { border-bottom: none; }
    .list-item-left { display: flex; align-items: center; gap: 12px; }
    .list-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 16px;
    }
    .list-name { color: #fff; font-weight: 600; font-size: 15px; }
    .list-date { color: rgba(255,255,255,0.4); font-size: 12px; }
    .list-count { color: #38ef7d; font-weight: 600; }
    
    .empty-state { text-align: center; padding: 30px; color: rgba(255,255,255,0.4); }
    .empty-icon { font-size: 40px; margin-bottom: 10px; }
    
    .leader-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .leader-item:last-child { border-bottom: none; }
    .leader-rank {
      width: 28px;
      height: 28px;
      background: rgba(102,126,234,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #667eea;
      font-weight: 700;
      font-size: 13px;
    }
    .leader-rank.gold { background: linear-gradient(135deg, #FFD700, #FFA500); color: #1e1e2f; }
    .leader-rank.silver { background: linear-gradient(135deg, #C0C0C0, #A0A0A0); color: #1e1e2f; }
    .leader-rank.bronze { background: linear-gradient(135deg, #CD7F32, #8B4513); color: #fff; }
    
    .profile-menu { position: relative; }
    .profile-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
    }
    .profile-dropdown {
      position: absolute;
      top: 50px;
      right: 0;
      background: #252538;
      border-radius: 14px;
      padding: 15px;
      min-width: 180px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      display: none;
      z-index: 100;
    }
    .profile-dropdown.show { display: block; }
    .profile-info { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .profile-name { color: #fff; font-weight: 600; font-size: 14px; }
    .profile-email { color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 2px; }
    .logout-link { color: #FF6B6B; text-decoration: none; font-size: 13px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="app-header">
    <div class="header-top">
      <div class="app-logo">
        <div class="app-logo-icon">🚀</div>
        <span class="app-logo-text">XKRO</span>
      </div>
      <div class="profile-menu" onclick="toggleProfile()">
        <div class="profile-avatar" id="profileAvatar">U</div>
        <div class="profile-dropdown" id="profileDropdown">
          <div class="profile-info">
            <div class="profile-name" id="profileName">User</div>
            <div class="profile-email" id="profileEmail">email@example.com</div>
          </div>
          <a href="/" class="logout-link">Logout</a>
        </div>
      </div>
    </div>
    
    <div class="user-info">
      <p class="user-greeting">Welcome back,</p>
      <h1 class="user-name" id="userName">User</h1>
    </div>
  </div>
  
  <div class="container">
    <div class="wallet-card">
      <p class="wallet-label">💰 Wallet Balance</p>
      <p class="wallet-amount">₹<span id="walletBalance">0</span></p>
      <p class="wallet-sub">Earn ₹10 per referral</p>
    </div>
    
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="referralCount">0</div>
        <div class="stat-label">Referrals</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="myCode">----</div>
        <div class="stat-label">Your Code</div>
      </div>
    </div>
    
    <div class="section">
      <p class="section-title">🔗 INVITE FRIENDS</p>
      <div class="referral-card">
        <div class="referral-link-box">
          <input type="text" class="referral-input" id="referralLink" readonly>
          <button class="btn-copy" onclick="copyLink()">Copy</button>
        </div>
        <div class="share-btns">
          <button class="share-btn whatsapp" onclick="shareWhatsApp()">💬 WhatsApp</button>
          <button class="share-btn share" onclick="shareNative()">📤 Share</button>
        </div>
      </div>
    </div>
    
    <div class="section">
      <p class="section-title">👥 MY REFERRALS</p>
      <div class="list-card" id="referralsList">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <p>No referrals yet</p>
          <p style="font-size: 12px; margin-top: 5px;">Share your link to start earning!</p>
        </div>
      </div>
    </div>
    
    <div class="section">
      <p class="section-title">🏆 LEADERBOARD</p>
      <div class="list-card" id="leaderboard">
        <div class="empty-state">
          <p>Loading...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let user = JSON.parse(localStorage.getItem('user'));
    
    if (!user) {
      window.location.href = '/';
    }

    const BASE_URL = window.location.origin;
    document.getElementById('userName').textContent = user.name;
    document.getElementById('walletBalance').textContent = user.walletBalance;
    document.getElementById('referralCount').textContent = user.referralCount;
    document.getElementById('myCode').textContent = user.referralCode;
    document.getElementById('referralLink').value = `${BASE_URL}/signup?ref=${user.referralCode}`;
    
    document.getElementById('profileAvatar').textContent = user.name.charAt(0).toUpperCase();
    document.getElementById('profileName').textContent = user.name;
    document.getElementById('profileEmail').textContent = user.email;
    
    function toggleProfile() {
      document.getElementById('profileDropdown').classList.toggle('show');
    }
    
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.profile-menu')) {
        document.getElementById('profileDropdown').classList.remove('show');
      }
    });

    async function loadReferrals() {
      const response = await fetch(`/api/my-referrals/${user.referralCode}`);
      const referrals = await response.json();
      
      if (referrals.length > 0) {
        document.getElementById('referralsList').innerHTML = referrals.map(r => `
          <div class="list-item">
            <div class="list-item-left">
              <div class="list-avatar">${r.name.charAt(0).toUpperCase()}</div>
              <div>
                <div class="list-name">${r.name}</div>
                <div class="list-date">${new Date(r.createdAt).toLocaleDateString()}</div>
              </div>
            </div>
            <div class="list-count">+₹10</div>
          </div>
        `).join('');
      }
    }

    async function loadLeaderboard() {
      const response = await fetch('/api/leaderboard');
      const leaders = await response.json();
      
      document.getElementById('leaderboard').innerHTML = leaders.map((l, i) => {
        let rankClass = '';
        if (i === 0) rankClass = 'gold';
        else if (i === 1) rankClass = 'silver';
        else if (i === 2) rankClass = 'bronze';
        
        return `
          <div class="leader-item">
            <div class="leader-rank ${rankClass}">${i + 1}</div>
            <div style="flex: 1;">
              <div class="list-name">${l.name}</div>
            </div>
            <div class="list-count">${l.referralCount} refs</div>
          </div>
        `;
      }).join('');
    }

    function copyLink() {
      const link = document.getElementById('referralLink');
      navigator.clipboard.writeText(link.value);
      alert('Link copied! 📋');
    }

    function shareWhatsApp() {
      const link = document.getElementById('referralLink').value;
      const text = `Join XKRO using my referral link and get ₹10!\n\n${link}`;
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function shareNative() {
      const link = document.getElementById('referralLink').value;
      if (navigator.share) {
        navigator.share({
          title: 'Join XKRO',
          text: 'Join XKRO using my referral link and get ₹10!',
          url: link
        }).then(() => {}).catch(() => {});
      } else {
        copyLink();
      }
    }

    loadReferrals();
    loadLeaderboard();
  </script>
</body>
</html>
